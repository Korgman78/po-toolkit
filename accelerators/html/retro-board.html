<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retro Board — PO Toolkit</title>
<style>
  :root { --bg: #0f1117; --card: #1a1c2b; --text: #e8eaf0; --muted: #6b7089; --border: #2a2d3e; --green: #10b981; --red: #ef4444; --blue: #6366f1; --yellow: #f59e0b; --pink: #ec4899; --cyan: #06b6d4; --orange: #f97316; --purple: #a855f7; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 1.5rem; }
  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; flex-wrap: wrap; gap: 0.75rem; }
  h1 { font-size: 1.56rem; font-weight: 800; color: #f8fafc; letter-spacing: -0.03em; }
  .header-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
  button { font-family: inherit; font-size: 0.85rem; font-weight: 600; padding: 0.5rem 1rem; border-radius: 8px; border: none; cursor: pointer; transition: all 0.2s; }
  .btn-primary { background: var(--blue); color: white; }
  .btn-primary:hover { filter: brightness(1.1); }
  .btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--blue); }
  .btn-small { padding: 0.3rem 0.6rem; font-size: 0.75rem; }

  /* Top bars */
  .top-bars { display: flex; gap: 0.75rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .bar { display: flex; align-items: center; gap: 0.6rem; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 0.45rem 0.9rem; font-size: 0.8rem; }
  .bar label { color: var(--muted); white-space: nowrap; }
  .bar input { flex: 1; min-width: 60px; padding: 0.3rem 0.5rem; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); font-family: inherit; font-size: 0.82rem; font-weight: 700; outline: none; }
  .bar input:focus { border-color: var(--blue); }
  .session-bar { flex: 1; min-width: 280px; }
  .session-bar input { color: var(--blue); text-align: center; letter-spacing: 0.05em; }
  .pseudo-bar input { color: var(--green); }
  .bar button { padding: 0.3rem 0.65rem; border-radius: 6px; border: 1px solid var(--border); background: var(--card); color: var(--text); cursor: pointer; font-family: inherit; font-size: 0.72rem; font-weight: 600; }
  .bar button:hover { border-color: var(--blue); color: var(--blue); }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
  .avatar { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.65rem; font-weight: 800; color: white; flex-shrink: 0; }

  /* Toggle */
  .toggle-wrap { display: flex; align-items: center; gap: 0.4rem; }
  .toggle-wrap label { font-size: 0.78rem; color: var(--muted); }
  .toggle { position: relative; width: 36px; height: 20px; cursor: pointer; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle span { position: absolute; inset: 0; background: var(--border); border-radius: 20px; transition: 0.3s; }
  .toggle span::before { content:''; position: absolute; width: 14px; height: 14px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: 0.3s; }
  .toggle input:checked + span { background: var(--blue); }
  .toggle input:checked + span::before { transform: translateX(16px); }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
  .modal-overlay.hidden { display: none; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 2.5rem; max-width: 380px; width: 90%; text-align: center; }
  .modal h2 { font-size: 1.24rem; margin-bottom: 0.4rem; font-weight: 800; color: #f8fafc; }
  .modal p { color: var(--muted); font-size: 0.82rem; margin-bottom: 1.2rem; }
  .modal input { width: 100%; padding: 0.7rem 1rem; border-radius: 10px; border: 2px solid var(--border); background: var(--bg); color: var(--text); font-family: inherit; font-size: 1rem; font-weight: 700; text-align: center; outline: none; margin-bottom: 0.8rem; }
  .modal input:focus { border-color: var(--blue); }
  .modal .mbtn { width: 100%; padding: 0.7rem; border-radius: 10px; border: none; background: var(--blue); color: white; font-family: inherit; font-size: 0.95rem; font-weight: 700; cursor: pointer; }
  .modal .mbtn:hover { filter: brightness(1.1); }

  .sprint-input { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 1rem; }
  .sprint-input input { padding: 0.4rem 0.65rem; border-radius: 8px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-family: inherit; font-size: 0.85rem; outline: none; width: 240px; }
  .sprint-input input:focus { border-color: var(--blue); }

  /* Template bar */
  .template-bar { display: flex; gap: 0.5rem; margin-bottom: 1.25rem; flex-wrap: wrap; align-items: center; }
  .tbtn { padding: 0.4rem 0.8rem; border-radius: 100px; border: 1px solid var(--border); background: var(--card); color: var(--muted); font-size: 0.75rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.2s; }
  .tbtn:hover { border-color: var(--blue); color: var(--blue); }
  .tbtn.active { background: var(--blue); border-color: var(--blue); color: white; }

  /* === COLUMN BOARD (Classic, 4L) === */
  .board { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1rem; }
  .column { background: var(--card); border-radius: 14px; border: 1px solid var(--border); overflow: hidden; min-height: 350px; display: flex; flex-direction: column; }
  .column-header { padding: 0.85rem 1.1rem; font-weight: 700; font-size: 0.95rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 3px solid; }
  .column-header .count { font-size: 0.72rem; background: rgba(255,255,255,0.08); padding: 0.1rem 0.45rem; border-radius: 100px; font-weight: 600; }
  .col-green .column-header { border-color: var(--green); color: var(--green); }
  .col-pink .column-header { border-color: var(--pink); color: var(--pink); }
  .col-blue .column-header { border-color: var(--blue); color: var(--blue); }
  .col-yellow .column-header { border-color: var(--yellow); color: var(--yellow); }
  .col-cyan .column-header { border-color: var(--cyan); color: var(--cyan); }
  .col-orange .column-header { border-color: var(--orange); color: var(--orange); }
  .col-red .column-header { border-color: var(--red); color: var(--red); }
  .col-purple .column-header { border-color: var(--purple); color: var(--purple); }
  .column-body { padding: 0.6rem; flex: 1; overflow-y: auto; }
  .add-area { padding: 0.5rem 0.6rem; border-top: 1px solid var(--border); }
  .add-area textarea { width: 100%; padding: 0.45rem; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-family: inherit; font-size: 0.82rem; resize: none; outline: none; min-height: 50px; }
  .add-area textarea:focus { border-color: var(--blue); }
  .add-area textarea::placeholder { color: var(--muted); }

  /* Cards */
  .rcard { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 0.65rem; margin-bottom: 0.4rem; transition: all 0.2s; }
  .rcard:hover { border-color: var(--blue); }
  .rcard .txt { font-size: 0.82rem; line-height: 1.5; margin-bottom: 0.4rem; word-break: break-word; }
  .rcard .meta { display: flex; align-items: center; justify-content: space-between; }
  .rcard .author { display: flex; align-items: center; gap: 0.25rem; font-size: 0.68rem; color: var(--muted); }
  .rcard .author .ma { width: 14px; height: 14px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 0.45rem; font-weight: 800; color: white; }
  .vbtn { display: inline-flex; align-items: center; gap: 0.25rem; padding: 0.2rem 0.5rem; border-radius: 6px; background: var(--card); border: 1px solid var(--border); color: var(--muted); cursor: pointer; font-family: inherit; font-size: 0.75rem; font-weight: 600; }
  .vbtn:hover { border-color: var(--blue); color: var(--blue); }
  .vbtn.voted { background: var(--blue); border-color: var(--blue); color: white; }
  .del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.75rem; padding: 0.15rem; }
  .del:hover { color: var(--red); }

  /* =============================================
     SPEED BOAT — Full visual layout
     ============================================= */
  .sb-scene { position: relative; width: 100%; min-height: 720px; border-radius: 20px; overflow: hidden; background: linear-gradient(180deg, #0c1929 0%, #132f4c 30%, #1a4971 50%, #0e3558 70%, #0a1e33 100%); border: 1px solid rgba(99,102,241,0.2); }

  /* Sky */
  .sb-sky { position: absolute; top: 0; left: 0; right: 0; height: 35%; pointer-events: none; }
  .sb-sun { position: absolute; top: 6%; right: 10%; width: 70px; height: 70px; background: radial-gradient(circle, #fbbf24 25%, rgba(251,191,36,0.4) 50%, rgba(251,191,36,0.1) 70%, transparent 80%); border-radius: 50%; box-shadow: 0 0 40px rgba(251,191,36,0.3); }
  .sb-cloud { position: absolute; font-size: 2rem; opacity: 0.3; filter: blur(0.5px); }

  /* Water line */
  .sb-water { position: absolute; top: 45%; left: 0; right: 0; bottom: 0; pointer-events: none; }
  .sb-wave { position: absolute; top: 0; left: 0; right: 0; height: 20px; overflow: hidden; }
  .sb-wave svg { width: 200%; animation: waveMove 8s linear infinite; }
  @keyframes waveMove { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  .sb-underwater { position: absolute; top: 20px; left: 0; right: 0; bottom: 0; background: linear-gradient(180deg, rgba(6,182,212,0.08) 0%, rgba(10,30,51,0.5) 100%); }

  /* Zones */
  .sb-zone { position: absolute; padding: 0.5rem; display: flex; flex-direction: column; gap: 0.4rem; z-index: 10; }
  .sb-zone-label { font-size: 0.72rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; padding: 0.25rem 0.7rem; border-radius: 100px; display: inline-flex; align-items: center; gap: 0.3rem; width: fit-content; backdrop-filter: blur(8px); }
  .sb-zone .cards-container { display: flex; flex-direction: column; gap: 0.35rem; max-height: 200px; overflow-y: auto; min-width: 220px; max-width: 280px; }
  .sb-zone .add-mini { font-size: 0.72rem; padding: 0.3rem; border-radius: 6px; border: 1px dashed rgba(255,255,255,0.15); background: rgba(255,255,255,0.03); color: var(--muted); cursor: pointer; font-family: inherit; text-align: center; }
  .sb-zone .add-mini:hover { border-color: var(--blue); color: var(--blue); }

  /* Zone positions */
  .sb-zone-island { top: 5%; right: 3%; width: 30%; }
  .sb-zone-wind { top: 5%; left: 3%; width: 28%; }
  .sb-zone-anchor { bottom: 3%; left: 3%; width: 28%; }
  .sb-zone-rock { bottom: 3%; right: 3%; width: 30%; }

  /* Zone colors */
  .sb-lbl-island { background: rgba(16,185,129,0.2); color: var(--green); }
  .sb-lbl-wind { background: rgba(6,182,212,0.2); color: var(--cyan); }
  .sb-lbl-anchor { background: rgba(249,115,22,0.2); color: var(--orange); }
  .sb-lbl-rock { background: rgba(239,68,68,0.2); color: var(--red); }

  /* Speed boat card */
  .sb-card { background: rgba(26,28,43,0.85); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 0.5rem 0.6rem; backdrop-filter: blur(6px); }
  .sb-card .txt { font-size: 0.78rem; line-height: 1.4; margin-bottom: 0.3rem; }
  .sb-card .meta { display: flex; align-items: center; justify-content: space-between; }

  /* Central boat SVG */
  .sb-boat-container { position: absolute; top: 28%; left: 50%; transform: translate(-50%, -50%); z-index: 5; pointer-events: none; text-align: center; }
  .sb-boat-label { font-size: 0.8rem; font-weight: 700; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.15em; margin-top: 0.5rem; }

  /* Input modal for speed boat */
  .sb-input-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 200; backdrop-filter: blur(2px); }
  .sb-input-modal.open { display: flex; }
  .sb-input-box { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; max-width: 400px; width: 90%; }
  .sb-input-box h3 { font-size: 1rem; margin-bottom: 0.75rem; }
  .sb-input-box textarea { width: 100%; padding: 0.6rem; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-family: inherit; font-size: 0.85rem; resize: none; outline: none; min-height: 80px; margin-bottom: 0.75rem; }
  .sb-input-box textarea:focus { border-color: var(--blue); }
  .sb-input-box .sb-input-actions { display: flex; gap: 0.5rem; justify-content: flex-end; }

  /* =============================================
     STARFISH — Radial layout
     ============================================= */
  .sf-container { position: relative; width: 100%; max-width: 900px; margin: 0 auto; min-height: 700px; }

  /* Central starfish */
  .sf-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 5; text-align: center; }
  .sf-center-label { font-size: 0.7rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; margin-top: 0.3rem; }

  /* 5 arms */
  .sf-arm { position: absolute; width: 240px; display: flex; flex-direction: column; align-items: center; gap: 0.4rem; z-index: 10; }
  .sf-arm-label { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; padding: 0.3rem 0.8rem; border-radius: 100px; display: inline-flex; align-items: center; gap: 0.3rem; }
  .sf-arm .cards-container { display: flex; flex-direction: column; gap: 0.3rem; width: 100%; max-height: 180px; overflow-y: auto; }
  .sf-arm .add-mini { font-size: 0.72rem; padding: 0.3rem; border-radius: 6px; border: 1px dashed var(--border); background: var(--card); color: var(--muted); cursor: pointer; font-family: inherit; text-align: center; width: 100%; }
  .sf-arm .add-mini:hover { border-color: var(--blue); color: var(--blue); }
  .sf-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 0.5rem 0.6rem; }
  .sf-card .txt { font-size: 0.78rem; line-height: 1.4; margin-bottom: 0.3rem; }
  .sf-card .meta { display: flex; align-items: center; justify-content: space-between; }

  /* Arm positions — pentagon layout */
  .sf-arm-0 { top: 0; left: 50%; transform: translateX(-50%); } /* top center: Keep */
  .sf-arm-1 { top: 22%; right: 0; } /* top right: More */
  .sf-arm-2 { bottom: 8%; right: 5%; } /* bottom right: Less */
  .sf-arm-3 { bottom: 8%; left: 5%; } /* bottom left: Stop */
  .sf-arm-4 { top: 22%; left: 0; } /* top left: Start */

  /* Arm colors */
  .sf-lbl-keep { background: rgba(16,185,129,0.15); color: var(--green); }
  .sf-lbl-more { background: rgba(99,102,241,0.15); color: var(--blue); }
  .sf-lbl-less { background: rgba(249,115,22,0.15); color: var(--orange); }
  .sf-lbl-stop { background: rgba(239,68,68,0.15); color: var(--red); }
  .sf-lbl-start { background: rgba(168,85,247,0.15); color: var(--purple); }

  /* Line from center to arm */
  .sf-line { position: absolute; z-index: 2; pointer-events: none; }

  /* Export modal */
  .export-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 100; }
  .export-modal.open { display: flex; }
  .export-content { background: var(--card); border-radius: 16px; padding: 2rem; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto; }
  .export-content h2 { margin-bottom: 1rem; }
  .export-content pre { background: var(--bg); padding: 1rem; border-radius: 8px; font-size: 0.8rem; white-space: pre-wrap; line-height: 1.6; }
  .export-actions { display: flex; gap: 0.5rem; margin-top: 1rem; }

  @media (max-width: 768px) {
    .sb-zone { position: relative !important; width: 100% !important; top: auto !important; left: auto !important; right: auto !important; bottom: auto !important; }
    .sb-scene { min-height: auto; display: flex; flex-direction: column; gap: 1rem; padding: 1rem; }
    .sb-boat-container, .sb-sky, .sb-water { display: none; }
    .sb-zone .cards-container { max-width: 100%; }
    .sf-container { min-height: auto; display: flex; flex-direction: column; gap: 1rem; position: relative; }
    .sf-arm { position: relative !important; width: 100% !important; top: auto !important; left: auto !important; right: auto !important; bottom: auto !important; transform: none !important; }
    .sf-center, .sf-line { display: none; }
  }
</style>
<script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
<script src="ably-config.js"></script>
<script src="ably-sync.js"></script>
</head>
<body>

<!-- Pseudo modal -->
<div class="modal-overlay" id="pseudo-modal">
  <div class="modal">
    <h2>Bienvenue !</h2>
    <p>Entrez votre pseudo pour rejoindre la rétrospective.</p>
    <input type="text" id="pseudo-input" placeholder="Votre pseudo..." autofocus onkeydown="if(event.key==='Enter')confirmPseudo()">
    <button class="mbtn" onclick="confirmPseudo()">Rejoindre</button>
  </div>
</div>

<!-- Speed Boat add card modal -->
<div class="sb-input-modal" id="sb-input-modal">
  <div class="sb-input-box">
    <h3 id="sb-input-title">Ajouter un item</h3>
    <textarea id="sb-input-text" placeholder="Votre item..." onkeydown="if(event.ctrlKey && event.key==='Enter')sbAddConfirm()"></textarea>
    <div class="sb-input-actions">
      <button class="btn-secondary" onclick="sbAddCancel()">Annuler</button>
      <button class="btn-primary" onclick="sbAddConfirm()">Ajouter</button>
    </div>
  </div>
</div>

<header>
  <h1>Retro Board</h1>
  <div class="header-actions">
    <button class="btn-secondary" onclick="exportRetro()">Exporter</button>
    <button class="btn-secondary" onclick="clearAll()">Tout effacer</button>
  </div>
</header>

<div class="top-bars">
  <div class="bar session-bar">
    <div class="dot"></div>
    <label>Session :</label>
    <input type="text" id="session-id" value="" placeholder="ID" onchange="changeSession(this.value)">
    <button onclick="newSession()">Nouvelle</button>
    <button onclick="copySessionLink(this)">Copier le lien</button>
  </div>
  <div class="bar pseudo-bar">
    <div class="avatar" id="my-avatar" style="background:var(--blue)">?</div>
    <label>Pseudo :</label>
    <input type="text" id="my-pseudo" value="" onchange="changePseudo(this.value)">
  </div>
  <div class="bar">
    <div class="toggle-wrap">
      <label>Anonyme</label>
      <label class="toggle"><input type="checkbox" id="anon-cb" onchange="toggleAnon()"><span></span></label>
    </div>
  </div>
</div>

<div class="sprint-input">
  <span style="color:var(--muted);font-size:0.82rem;">Sprint :</span>
  <input type="text" id="sprint-name" placeholder="Sprint 12 — 01/04 au 12/04">
</div>

<div class="template-bar">
  <span style="color:var(--muted);font-size:0.78rem;margin-right:0.3rem;">Format :</span>
  <button class="tbtn active" onclick="setTpl('classic',this)">Classique</button>
  <button class="tbtn" onclick="setTpl('4l',this)">4L</button>
  <button class="tbtn" onclick="setTpl('starfish',this)">⭐ Starfish</button>
  <button class="tbtn" onclick="setTpl('speedboat',this)">⛵ Speed Boat</button>
</div>

<div id="board-container"></div>

<div class="export-modal" id="export-modal">
  <div class="export-content">
    <h2>Export Rétrospective</h2>
    <pre id="export-text"></pre>
    <div class="export-actions">
      <button class="btn-primary" onclick="copyExport(this)">Copier</button>
      <button class="btn-secondary" onclick="closeExport()">Fermer</button>
    </div>
  </div>
</div>

<script>
const APP_KEY = 'retro-board';
const COLORS = ['#ec4899','#6366f1','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#d946ef','#f97316','#14b8a6'];

const TPL = {
  classic: {
    type: 'columns',
    cols: [
      { id:'good', title:'Ce qui a bien marché', cls:'col-green', emoji:'✅' },
      { id:'improve', title:'À améliorer', cls:'col-pink', emoji:'⚡' },
      { id:'action', title:'Actions', cls:'col-blue', emoji:'🎯' },
    ]
  },
  '4l': {
    type: 'columns',
    cols: [
      { id:'liked', title:'Liked', cls:'col-green', emoji:'💚' },
      { id:'learned', title:'Learned', cls:'col-blue', emoji:'💡' },
      { id:'lacked', title:'Lacked', cls:'col-pink', emoji:'💔' },
      { id:'longed', title:'Longed for', cls:'col-yellow', emoji:'⭐' },
    ]
  },
  starfish: {
    type: 'starfish',
    cols: [
      { id:'keep', title:'Keep doing', cls:'keep', emoji:'✅', color:'var(--green)' },
      { id:'more', title:'More of', cls:'more', emoji:'➕', color:'var(--blue)' },
      { id:'less', title:'Less of', cls:'less', emoji:'➖', color:'var(--orange)' },
      { id:'stop', title:'Stop doing', cls:'stop', emoji:'🛑', color:'var(--red)' },
      { id:'start', title:'Start doing', cls:'start', emoji:'🚀', color:'var(--purple)' },
    ]
  },
  speedboat: {
    type: 'speedboat',
    cols: [
      { id:'island', title:'Notre objectif', cls:'island', emoji:'🏝️', color:'var(--green)' },
      { id:'wind', title:'Ce qui nous propulse', cls:'wind', emoji:'💨', color:'var(--cyan)' },
      { id:'anchor', title:'Ce qui nous ralentit', cls:'anchor', emoji:'⚓', color:'var(--orange)' },
      { id:'rock', title:'Les risques', cls:'rock', emoji:'🪨', color:'var(--red)' },
    ]
  }
};

let currentTpl = 'classic';
let columns = {};
let myPseudo = '';
let isAnon = false;
let sbAddTarget = null; // for speedboat modal

// ---- Utils ----
function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
function avatarLetter(n) { return (n||'?')[0].toUpperCase(); }
function getColor(p) { let h=0; for(let i=0;i<p.length;i++) h=p.charCodeAt(i)+((h<<5)-h); return COLORS[Math.abs(h)%COLORS.length]; }

function confirmPseudo() {
  const v = document.getElementById('pseudo-input').value.trim();
  if(!v) { document.getElementById('pseudo-input').style.borderColor='var(--red)'; return; }
  myPseudo = v;
  localStorage.setItem(APP_KEY+'-pseudo', myPseudo);
  document.getElementById('pseudo-modal').classList.add('hidden');
  document.getElementById('my-pseudo').value = myPseudo;
  document.getElementById('my-avatar').textContent = avatarLetter(myPseudo);
  document.getElementById('my-avatar').style.background = getColor(myPseudo);
}
function changePseudo(v) {
  if(!v.trim()) return;
  myPseudo = v.trim();
  localStorage.setItem(APP_KEY+'-pseudo', myPseudo);
  document.getElementById('my-avatar').textContent = avatarLetter(myPseudo);
  document.getElementById('my-avatar').style.background = getColor(myPseudo);
  render();
}
function toggleAnon() { isAnon = document.getElementById('anon-cb').checked; render(); save(); }

// ---- Template ----
function setTpl(name, btn) {
  if(btn) { document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); }
  currentTpl = name;
  columns = {};
  TPL[name].cols.forEach(c => { columns[c.id] = { ...c, cards: [] }; });
  render(); save();
}

// ---- Card rendering helper ----
function cardHTML(colId, card, i, cls) {
  const ac = card.author ? getColor(card.author) : '#6b7089';
  const showA = !isAnon && card.author;
  return `<div class="${cls}">
    <div class="txt">${esc(card.text)}</div>
    <div class="meta">
      <div style="display:flex;align-items:center;gap:0.4rem;">
        <button class="vbtn ${card.voted?'voted':''}" onclick="vote('${colId}',${i})">▲ ${card.votes}</button>
        ${showA ? `<span class="author"><span class="ma" style="background:${ac}">${avatarLetter(card.author)}</span>${esc(card.author)}</span>` : (isAnon ? '<span class="author">👤</span>' : '')}
      </div>
      <button class="del" onclick="delCard('${colId}',${i})">✕</button>
    </div>
  </div>`;
}

// ---- RENDER ----
function render() {
  const tpl = TPL[currentTpl];
  if (tpl.type === 'columns') renderColumns();
  else if (tpl.type === 'speedboat') renderSpeedBoat();
  else if (tpl.type === 'starfish') renderStarfish();
}

// ---- Columns (Classic, 4L) ----
function renderColumns() {
  const container = document.getElementById('board-container');
  container.innerHTML = `<div class="board">${Object.values(columns).map(col => `
    <div class="column ${col.cls}">
      <div class="column-header"><span>${col.emoji} ${col.title}</span><span class="count">${col.cards.length}</span></div>
      <div class="column-body">${col.cards.sort((a,b)=>b.votes-a.votes).map((c,i) => cardHTML(col.id, c, i, 'rcard')).join('')}</div>
      <div class="add-area">
        <textarea id="in-${col.id}" placeholder="Ajouter..." onkeydown="if(event.ctrlKey&&event.key==='Enter')addCard('${col.id}')"></textarea>
        <button class="btn-primary btn-small" style="width:100%;margin-top:0.3rem;" onclick="addCard('${col.id}')">Ajouter</button>
      </div>
    </div>
  `).join('')}</div>`;
}

function renderSBCards(colId) {
  if (!columns[colId]) return '';
  return columns[colId].cards.sort((a,b)=>b.votes-a.votes).map((c,i) => cardHTML(colId, c, i, 'sb-card')).join('');
}

function sbAddOpen(colId) {
  sbAddTarget = colId;
  const col = columns[colId];
  document.getElementById('sb-input-title').textContent = `${col.emoji} ${col.title}`;
  document.getElementById('sb-input-text').value = '';
  document.getElementById('sb-input-modal').classList.add('open');
  setTimeout(() => document.getElementById('sb-input-text').focus(), 100);
}
function sbAddCancel() { document.getElementById('sb-input-modal').classList.remove('open'); sbAddTarget = null; }
function sbAddConfirm() {
  const txt = document.getElementById('sb-input-text').value.trim();
  if (!txt || !sbAddTarget) return;
  columns[sbAddTarget].cards.push({ text: txt, votes: 0, voted: false, author: myPseudo || 'Anonyme' });
  document.getElementById('sb-input-modal').classList.remove('open');
  sbAddTarget = null;
  render(); save();
}

        <circle cx="98" cy="88" r="4" fill="#92400e" opacity="0.5"/>
        <circle cx="122" cy="88" r="4" fill="#92400e" opacity="0.5"/>
        <circle cx="99" cy="87" r="1.5" fill="white" opacity="0.4"/>
        <circle cx="123" cy="87" r="1.5" fill="white" opacity="0.4"/>
        <path d="M100,100 Q110,112 120,100" fill="none" stroke="#92400e" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
        <!-- Cheeks -->
        <circle cx="90" cy="98" r="5" fill="rgba(236,72,153,0.12)"/>
        <circle cx="130" cy="98" r="5" fill="rgba(236,72,153,0.12)"/>
      </svg>
      <div class="sf-center-label">Rétrospective Starfish</div>
    </div>

    <!-- 5 Arms -->
    ${armOrder.map((armId, i) => {
      const col = columns[armId];
      if (!col) return '';
      return `
      <div class="sf-arm sf-arm-${i}">
        <span class="sf-arm-label sf-lbl-${col.cls}">${col.emoji} ${col.title} (${col.cards.length})</span>
        <div class="cards-container">${col.cards.sort((a,b)=>b.votes-a.votes).map((c,ci) => cardHTML(col.id, c, ci, 'sf-card')).join('')}</div>
        <button class="add-mini" onclick="sbAddOpen('${col.id}')">+ Ajouter</button>
      </div>`;
    }).join('')}

    <!-- Lines from center to arms (SVG overlay) -->
    <svg class="sf-line" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;" viewBox="0 0 900 700">
      <line x1="450" y1="350" x2="450" y2="80" stroke="var(--green)" stroke-width="1.5" opacity="0.15"/>
      <line x1="450" y1="350" x2="780" y2="200" stroke="var(--blue)" stroke-width="1.5" opacity="0.15"/>
      <line x1="450" y1="350" x2="720" y2="560" stroke="var(--orange)" stroke-width="1.5" opacity="0.15"/>
      <line x1="450" y1="350" x2="180" y2="560" stroke="var(--red)" stroke-width="1.5" opacity="0.15"/>
      <line x1="450" y1="350" x2="120" y2="200" stroke="var(--purple)" stroke-width="1.5" opacity="0.15"/>
    </svg>
  </div>`;
}

// ---- Card actions ----
function addCard(colId) {
  const input = document.getElementById(`in-${colId}`);
  const txt = input.value.trim();
  if (!txt) return;
  columns[colId].cards.push({ text: txt, votes: 0, voted: false, author: myPseudo || 'Anonyme' });
  input.value = '';
  render(); save();
}

function delCard(colId, i) {
  columns[colId].cards.splice(i, 1);
  render(); save();
}

function vote(colId, i) {
  const card = columns[colId].cards[i];
  if (card.voted) { card.votes--; card.voted = false; }
  else { card.votes++; card.voted = true; }
  render(); save();
}

function clearAll() {
  if (!confirm('Effacer toutes les cartes ?')) return;
  Object.values(columns).forEach(col => col.cards = []);
  render(); save();
}

// ---- Export ----
function exportRetro() {
  const sprint = document.getElementById('sprint-name').value || 'Rétrospective';
  const tplName = { classic:'Classique', '4l':'4L', starfish:'Starfish ⭐', speedboat:'Speed Boat ⛵' }[currentTpl];
  let text = `RÉTROSPECTIVE — ${sprint}\nFormat : ${tplName}\n${'='.repeat(50)}\n\n`;
  for (const col of Object.values(columns)) {
    text += `${col.emoji} ${col.title.toUpperCase()} (${col.cards.length})\n${'-'.repeat(40)}\n`;
    [...col.cards].sort((a,b)=>b.votes-a.votes).forEach((c,i) => {
      const auth = !isAnon && c.author ? ` [${c.author}]` : '';
      text += `  ${i+1}. ${c.text}${c.votes>0 ? ` (${c.votes} vote${c.votes>1?'s':''})` : ''}${auth}\n`;
    });
    text += '\n';
  }
    text += `Généré le ${new Date().toLocaleDateString('fr-FR')} — PO Toolkit`;
  document.getElementById('export-text').textContent = text;
  document.getElementById('export-modal').classList.add('open');
}
function copyExport(btn) {
  navigator.clipboard.writeText(document.getElementById('export-text').textContent).then(() => {
    btn.textContent = 'Copié !';
    setTimeout(() => btn.textContent = 'Copier', 2000);
  });
}
function closeExport() { document.getElementById('export-modal').classList.remove('open'); }

// ---- Session ----
function genId() { return Math.random().toString(36).substring(2,8).toUpperCase(); }
function getSessionId() {
  const p = new URLSearchParams(window.location.search).get('session');
  if (p) return p;
  return localStorage.getItem(APP_KEY+'-last-session') || genId();
}
function changeSession(v) {
  if(!v.trim()) return;
  const id = v.trim().toUpperCase();
  document.getElementById('session-id').value = id;
  localStorage.setItem(APP_KEY+'-last-session', id);
  const u = new URL(window.location); u.searchParams.set('session', id);
  window.history.replaceState({}, '', u);
  load();
}
function newSession() { changeSession(genId()); }
function copySessionLink(btn) {
  const u = new URL(window.location);
  u.searchParams.set('session', document.getElementById('session-id').value);
  navigator.clipboard.writeText(u.toString()).then(() => {
    btn.textContent = 'Copié !';
    setTimeout(() => btn.textContent = 'Copier le lien', 2000);
  });
}
let _ablyReceiving = false;
function save() {
  const id = document.getElementById('session-id').value;
  const data = { tpl: currentTpl, columns, sprint: document.getElementById('sprint-name').value, anon: isAnon };
  localStorage.setItem(APP_KEY+'-session-'+id, JSON.stringify(data));
  localStorage.setItem(APP_KEY+'-last-session', id);
  if (!_ablyReceiving && window.ablySync) ablySync.broadcast(data);
}
function load() {
  const id = document.getElementById('session-id').value;
  const raw = localStorage.getItem(APP_KEY+'-session-'+id);
  if (raw) {
    try {
      const d = JSON.parse(raw);
      currentTpl = d.tpl || 'classic';
      columns = d.columns || {};
      isAnon = d.anon || false;
      document.getElementById('anon-cb').checked = isAnon;
      document.getElementById('sprint-name').value = d.sprint || '';
      document.querySelectorAll('.tbtn').forEach(b => b.classList.remove('active'));
      const names = ['classic','4l','starfish','speedboat'];
      const idx = names.indexOf(currentTpl);
      if (idx >= 0) document.querySelectorAll('.tbtn')[idx].classList.add('active');
      render();
    } catch(e) { console.warn(e); setTpl('classic'); }
  } else { setTpl('classic'); }
}
function initSession() {
  const id = getSessionId();
  document.getElementById('session-id').value = id;
  localStorage.setItem(APP_KEY+'-last-session', id);
  const u = new URL(window.location); u.searchParams.set('session', id);
  window.history.replaceState({}, '', u);
  load();
}

// ---- Sync (cross-tab + Ably real-time) ----
function mergeIncoming(incoming) {
  const incomingCols = incoming.columns || {};
  for (const colKey of Object.keys(incomingCols)) {
    if (!columns[colKey]) {
      columns[colKey] = incomingCols[colKey];
      continue;
    }
    const localById = new Map(columns[colKey].cards.map(c => [c.id, c]));
    const incomingCards = incomingCols[colKey].cards || [];
    incomingCards.forEach(c => localById.set(c.id, c));
    columns[colKey].cards = Array.from(localById.values());
  }
  for (const colKey of Object.keys(columns)) {
    if (!incomingCols[colKey]) delete columns[colKey];
  }
  if (incoming.tpl && incoming.tpl !== currentTpl) {
    currentTpl = incoming.tpl;
    document.querySelectorAll('.tbtn').forEach(b => b.classList.remove('active'));
    const names = ['classic','4l','starfish','speedboat'];
    const idx = names.indexOf(currentTpl);
    if (idx >= 0) document.querySelectorAll('.tbtn')[idx].classList.add('active');
  }
  if (incoming.sprint !== undefined) {
    document.getElementById('sprint-name').value = incoming.sprint;
  }
  if (incoming.anon !== undefined) {
    isAnon = incoming.anon;
    document.getElementById('anon-cb').checked = isAnon;
  }
  render();
}

window.addEventListener('storage', (event) => {
  const id = document.getElementById('session-id').value;
  if (event.key !== APP_KEY + '-session-' + id || !event.newValue) return;
  try {
    _ablyReceiving = true;
    mergeIncoming(JSON.parse(event.newValue));
    _ablyReceiving = false;
  } catch(e) { _ablyReceiving = false; }
});

// Ably real-time (cross-device)
function joinAblyChannel() {
  if (!window.ablySync) return;
  const id = document.getElementById('session-id').value;
  ablySync.join('retro:' + id, (data) => {
    try {
      _ablyReceiving = true;
      mergeIncoming(data);
      _ablyReceiving = false;
    } catch(e) { _ablyReceiving = false; }
  });
}

// ---- Init ----
function init() {
  const saved = localStorage.getItem(APP_KEY+'-pseudo');
  if (saved) {
    myPseudo = saved;
    document.getElementById('pseudo-modal').classList.add('hidden');
    document.getElementById('my-pseudo').value = myPseudo;
    document.getElementById('my-avatar').textContent = avatarLetter(myPseudo);
    document.getElementById('my-avatar').style.background = getColor(myPseudo);
  } else {
    setTimeout(() => document.getElementById('pseudo-input').focus(), 100);
  }
  initSession();
  joinAblyChannel();
}
init();
</script>
