<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PO Toolkit — Le guide de référence du Product Owner</title>
  <meta name="description" content="Guide complet et objectif des outils, méthodes et accélérateurs du Product Owner. Outils analysés, templates téléchargeables et mini-apps interactives.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#128640;</text></svg>">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div style="display: flex; align-items: center; gap: 1rem;">
      <button class="mobile-menu-btn" aria-label="Menu">&#9776;</button>
      <a href="#home" class="header-logo">
        <div class="logo-icon">PO</div>
        <span>Toolkit</span>
      </a>
    </div>
    <div class="header-actions">
      <div class="search-box" role="button" tabindex="0" aria-label="Rechercher">
        <span class="search-icon">&#128269;</span>
        <input type="text" placeholder="Rechercher un outil, une méthode..." readonly>
        <kbd>Ctrl+K</kbd>
      </div>
      <button class="theme-toggle" aria-label="Changer le theme">&#9790;</button>
    </div>
  </header>

  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar"></nav>

  <!-- Main Content -->
  <main class="main" id="main-content"></main>

  <!-- Search Modal -->
  <div class="search-modal" id="search-modal">
    <div class="search-modal-content">
      <input type="text" class="search-modal-input" id="search-input" placeholder="Rechercher un outil, une méthode, un framework..." autofocus>
      <div class="search-results" id="search-results"></div>
    </div>
  </div>

  <!-- Back to Top -->
  <button class="back-to-top" aria-label="Retour en haut">&#8593;</button>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
