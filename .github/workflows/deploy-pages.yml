name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build static bundle
        env:
          ABLY_KEY: ${{ secrets.ABLY_KEY }}
        run: |
          mkdir -p dist
          cp index.html dist/index.html
          cp -r site dist/site
          cp -r accelerators dist/accelerators
          if [ -n "$ABLY_KEY" ]; then
            echo "window.ABLY_KEY = '$ABLY_KEY';" > dist/accelerators/html/ably-config.js
          else
            echo "// No ABLY_KEY secret configured" > dist/accelerators/html/ably-config.js
          fi
          touch dist/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
